name: Build Native Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: migrator-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            artifact: migrator-linux-aarch64.tar.gz
          - os: macos-latest
            artifact: migrator-darwin-arm64.tar.gz
          - os: windows-latest
            artifact: migrator-windows.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build native image
        run: ./gradlew nativeCompile
        env:
          GRADLE_OPTS: -Djava.io.tmpdir=${{ runner.temp }}

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar -czf build/native/nativeCompile/${{ matrix.artifact }} -C build/native/nativeCompile migrator

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/native/nativeCompile/migrator.exe -DestinationPath build/native/nativeCompile/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/native/nativeCompile/${{ matrix.artifact }}

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
